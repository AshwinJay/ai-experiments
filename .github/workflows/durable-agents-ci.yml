name: durable-agents CI

on:
  push:
    branches: [main]
    paths:
      - 'durable-agents/**'
  pull_request:
    paths:
      - 'durable-agents/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: durable-agents

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, test, and integration test
        run: mvn verify --batch-mode
